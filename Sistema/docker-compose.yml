version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ong_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ong_db
      MYSQL_USER: admin_ong
      MYSQL_PASSWORD: senha_super_secreta
      MYSQL_ROOT_PASSWORD: root_senha_secreta
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: