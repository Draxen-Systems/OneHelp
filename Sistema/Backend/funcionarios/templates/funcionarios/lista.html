<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Funcionários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Funcionários Ativos (MySQL via Docker)</h2>
    
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Nome</th>
                <th>Cargo</th>
                <th>E-mail</th>
                <th>Nível</th>
                <th>Status</th>
                <th>Ações</th> 
            </tr>
        </thead>
        <tbody>
            {% for f in funcionarios %}
            <tr>
                <td>{{ f.nome }}</td>
                <td>{{ f.funcao }}</td>
                <td>{{ f.email }}</td>
                <td>{{ f.nivel_acesso }}</td>
                <td><span class="badge bg-success">{{ f.status }}</span></td>                
                <td>
                    <a href="{% url 'editar_funcionario' f.id %}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="{% url 'deletar_funcionario' f.id %}" 
                    class="btn btn-sm btn-danger" 
                    onclick="return confirm('Deseja realmente desativar este funcionário?')">Excluir</a>
                </td>
            </tr> 
            {% empty %}
            <tr>
                <td colspan="6" class="text-center">Nenhum funcionário ativo encontrado.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <a href="/admin/funcionarios/funcionario/add/" class="btn btn-primary">Cadastrar Novo (via Admin)</a>
</body>
</html>
